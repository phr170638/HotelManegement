server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: localhost
      port: 6379
      password:

mybatis-plus:
  mapper-locations: classpath*:com/hotel/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# JWT 配置
jwt:
  secret: hotel-management-system-jwt-secret-key-2026-min-256-bits-long-enough
  expiration: 86400000

# 支付宝沙箱配置（真实密钥在 application-local.yml 或环境变量）
alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_ALIPAY_PUBLIC_KEY:}
  gateway-url: https://openapi.alipaydev.com/gateway.do
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/order/pay-notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:5173/order/result}
